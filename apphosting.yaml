# Firebase App Hosting Configuration for Med-iTrack
# This file configures Cloud Run settings and environment variables

# Cloud Run configuration
runConfig:
  minInstances: 1
  maxInstances: 10
  concurrency: 80
  cpu: 1
  memoryMiB: 512

# Environment variables for build and runtime
env:
  # Firebase Configuration
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    value: AIzaSyDfMGIX3iqXwGmKdZ95oPLakZ3M59-OVGM
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: med-itrack-ai.firebaseapp.com
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: med-itrack-ai
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "376289882478"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:376289882478:web:15fa6834d0c2dd5d08917f"
    availability:
      - BUILD
      - RUNTIME

  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: med-itrack-ai.firebasestorage.app
    availability:
      - BUILD
      - RUNTIME

  # Gemini AI Configuration
  - variable: GENKIT_GOOGLE_GENAI_API_KEY
    secret: gemini-api-key
    availability:
      - BUILD
      - RUNTIME

  # Google Sheets Configuration
  - variable: GOOGLE_SERVICE_ACCOUNT_EMAIL
    value: firebase-app-hosting-compute@med-itrack-ai.iam.gserviceaccount.com
    availability:
      - BUILD
      - RUNTIME

  - variable: GOOGLE_PRIVATE_KEY
    secret: google-private-key
    availability:
      - BUILD
      - RUNTIME

  - variable: GOOGLE_SHEET_ID
    value: 1WYUsWxT9BMjtN1-_ky27W71hlS_RBlKRJzg83U_cQHs
